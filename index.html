const clamp = (v,mn,mx) => Math.max(mn,Math.min(mx,v));

function calcBMI(w,h){ if(!w||!h) return 0; return +(w/((h/100)**2)).toFixed(1); }
function bmiLabel(b){ if(b<18.5) return["Underweight",T.cyan]; if(b<25) return["Normal",T.green]; if(b<30) return["Overweight",T.amber]; return["Obese",T.red]; }

function calcCalGoal(w,h,age,gender,activity,goal){
  if(!w) return 2000;
  const bmr = gender==="Female"?10*w+6.25*h-5*age-161:10*w+6.25*h-5*age+5;
  const af = {Sedentary:1.2,Light:1.375,Moderate:1.55,Active:1.725,VeryActive:1.9}[activity]||1.55;
  const tdee = bmr*af;
  const adj = {"Fat Loss":-500,Cutting:-600,"Muscle Gain":300,Bulking:500,Strength:200,Maintain:0}[goal]||0;
  return Math.round(tdee+adj);
}

function calcProtein(w,goal){
  const mul = {"Muscle Gain":2.2,Bulking:2.0,Strength:2.0,Cutting:2.4,"Fat Loss":1.8,Maintain:1.6}[goal]||1.8;
  return Math.round((w||70)*mul);
}

async function callAI(messages, systemPrompt, json=false){
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-3-5-sonnet-20241022",max_tokens:1000,system:systemPrompt,messages})
    });
    const data = await res.json();
    const text = (data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("");
    if(json){ const cleaned=text.replace(/```json|```/g,"").trim(); return JSON.parse(cleaned); }
    return text;
  } catch(e){ return json?null:"AI offline. Track metrics manually."; }
}

// ─── HIGH GRADE SYSTEM INTERFACE GRAPHICS UTILITIES ──────────────────────────
function Btn({children,onClick,style,variant="primary",disabled,small}){
  const base={border:"none",cursor:disabled?"not-allowed":"pointer",fontFamily:T.font,fontWeight:700,borderRadius:T.r,transition:"opacity .15s",opacity:disabled?0.5:1,padding:small?"8px 16px":"13px 22px",fontSize:small?"13px":"15px"};
  const variants={primary:{background:T.grad,color:"#fff"},secondary:{background:T.card,color:T.text,border:`1px solid ${T.border}`},ghost:{background:"transparent",color:T.muted,border:`1px solid ${T.border}`},danger:{background:T.red,color:"#fff"},green:{background:T.gradGreen,color:"#fff"}};
  return <button onClick={disabled?undefined:onClick} style={{...base,...variants[variant],...style}}>{children}</button>;
}
function Card({children,style,onClick}){ return <div onClick={onClick} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:T.rLg,padding:"16px",cursor:onClick?"pointer":"default",...style}}>{children}</div>; }
function Input({label,value,onChange,type="text",placeholder,style}){
  return(
    <div style={{marginBottom:"14px",...style,width:"100%"}}>
      {label&&<div style={{color:T.muted,fontSize:"12px",marginBottom:"6px",fontWeight:600,letterSpacing:".5px",textTransform:"uppercase"}}>{label}</div>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,borderRadius:T.r,color:T.text,padding:"12px 14px",fontSize:"15px",fontFamily:T.font,outline:"none",boxSizing:"border-box"}}/>
    </div>
  );
}
function Select({label,value,onChange,options,style}){

      <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,borderRadius:T.r,color:T.text,padding:"12px 14px",fontSize:"15px",fontFamily:T.font,outline:"none",boxSizing:"border-box"}}>

}
function ProgressBar({value,max,color,height=8,style}){
  const pct=max>0?clamp((value/max)*100,0,100):0;
  return(<div style={{background:"rgba(255,255,255,0.08)",borderRadius:99,overflow:"hidden",height,...style}}><div style={{width:`${pct}%`,height:"100%",background:color||T.grad,borderRadius:99,transition:"width .4s"}}/></div>);
}
function Badge({label,color,style}){ return <span style={{background:color?`${color}22`:"rgba(255,255,255,0.06)",color:color||T.muted,border:`1px solid ${color?`${color}44`:T.border}`,borderRadius:99,padding:"4px 12px",fontSize:"11px",fontWeight:700,letterSpacing:".3px",...style}}>{label}</span>; }
function Toast({msg,type="info"}){
  if(!msg) return null;
  const colors={info:T.cyan,success:T.green,error:T.red,warning:T.amber};
  return <div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:colors[type],color:"#fff",padding:"10px 20px",borderRadius:T.r,fontWeight:700,fontSize:"13px",zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.5)",animation:"fadeIn .2s"}}>{msg}</div>;
}

function Spinner(){ return <div style={{width:24,height:24,borderRadius:"50%",border:`3px solid ${T.border}`,borderTopColor:T.purple,animation:"spin 0.8s linear infinite",margin:"20px auto"}}/>; }

function LineChart({data,goal,color=T.purple}){
  if(!data||data.length<2) return <div style={{color:T.dim,textAlign:"center",padding:"40px 0",fontSize:"13px"}}>Awaiting structural log sync</div>;
  const W=320,H=140,pad=30; const vals=data.map(d=>d.value); const mn=Math.min(...vals,goal||Infinity)*0.9; const mx=Math.max(...vals,goal||0)*1.1||10;
  const px=i=>pad+(i/(data.length-1))*(W-pad*2); const py=v=>H-pad-((v-mn)/(mx-mn))*(H-pad*2); const pts=data.map((d,i)=>`${px(i)},${py(d.value)}`).join(" ");
  const fillPts=`${px(0)},${H-pad} ${pts} ${px(data.length-1)},${H-pad}`; const gid=`g${Math.random().toString(36).slice(2)}`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={fillPts} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {goal&&<line x1={pad} y1={py(goal)} x2={W-pad} y2={py(goal)} stroke={T.amber} strokeWidth="1.5" strokeDasharray="5,4"/>}
      {data.map((d,i)=><text key={i} x={px(i)} y={H-6} textAnchor="middle" fill={T.dim} fontSize="9">{d.label}</text>)}
    </svg>
  );
}
function BarChart({data,color=T.purple}){
  if(!data||data.length===0) return null; const mx=Math.max(...data.map(d=>d.value),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80,padding:"0 4px"}}>

          <div style={{fontSize:9,color:T.dim,textAlign:"center"}}>{d.label}</div>
        </div>

function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [name,setName]=useState("");
  const [refInput,setRefInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    const urlParams = new URLSearchParams(window.location.search);
    const refCode = urlParams.get("ref");
    if(refCode){ setRefInput(refCode); setMode("signup"); }
  },[]);

  async function handleSubmit(){
    setLoading(true); setErr("");
    try{
      if(mode==="login"){
        const cred = await auth.signInWithEmailAndPassword(email,pass);
        onAuth(cred.user);
      } else {
        const generatedRefKey = (name.slice(0,4).toUpperCase() + Math.floor(1000 + Math.random() * 9000));
        let trialExpirationTimeline = Date.now() + 7 * 86400000;

        if (refInput.trim()) {
          const snap = await db.collection("users").where("myReferralCode", "==", refInput.trim().toUpperCase()).get();
          if (!snap.empty) {
            const referrerDoc = snap.docs[0];
            const referrerData = referrerDoc.data();
            const currentExp = referrerData.sub?.expiresAt || referrerData.sub?.trialEnd || new Date().toISOString();
            const extendedTimeline = new Date(new Date(currentExp).getTime() + (7 * 86400000)).toISOString();
            
            await db.collection("users").doc(referrerDoc.id).set({
              sub: { ...referrerData.sub, [referrerData.sub?.status === "active" ? "expiresAt" : "trialEnd"]: extendedTimeline },
              referralCount: (referrerData.referralCount || 0) + 1
            }, { merge: true });
            trialExpirationTimeline += 3 * 86400000; // Credit extra trial extension to joiner node
          }
        }

        const cred = await auth.createUserWithEmailAndPassword(email,pass);
        await db.collection("users").doc(cred.user.uid).set({
          email, name, phone: "", createdAt: new Date().toISOString(),
          isAdmin: email===ADMIN_EMAIL, myReferralCode: generatedRefKey,
          claimUsed: refInput.trim() ? true : false, referralCount: 0,
          sub: { status:"trial", trialEnd: new Date(trialExpirationTimeline).toISOString() }
        });
        onAuth(cred.user);
      }
    } catch(e){ setErr(e.message); }
    setLoading(false);
  }

  return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,color:T.text}}>
      <div style={{fontSize:52,marginBottom:12}}>⚜️</div>
      <div style={{fontSize:28,fontWeight:900,background:T.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>FitPro AI</div>
      <div style={{color:T.muted,fontSize:"13px",marginBottom:32}}>Elite Tier Performance SaaS Hub</div>
      <Card style={{width:"100%",maxWidth:380}}>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {["login","signup"].map(m=><Chip key={m} label={m==="login"?"Login":"Sign Up"} active={mode===m} onClick={()=>setMode(m)}/>)}
        </div>
        {mode==="signup"&&<Input label="Full Name Profile" value={name} onChange={setName} placeholder="Your name"/>}
        <Input label="Email Address" value={email} onChange={setEmail} type="email" placeholder="email@example.com"/>
        <Input label="Security Password" value={pass} onChange={setPass} type="password" placeholder="Min 6 characters"/>
        {mode==="signup"&&<Input label="Referral Invitation Token" value={refInput} onChange={setRefInput} placeholder="Optional Key Code" />}
        {err&&<div style={{color:T.red,fontSize:"12px",marginBottom:12}}>{err}</div>}
        <Btn onClick={handleSubmit} disabled={loading} style={{width:"100%"}}>{loading?<Spinner/>:mode==="login"?"🔓 Unlock Hub Workspace":"🚀 Initialize Account"}</Btn>
      </Card>
    </div>
  );
}

function Onboarding({user,onDone}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:"",age:"25",gender:"Male",height:"170",weight:"70",level:"Beginner",goal:"Fat Loss",diet:"Veg",activity:"Moderate",sleep:"7",water:"3"});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  async function handleNext(){
    if(step<2){setStep(s=>s+1);return;}
    const w=+form.weight,h=+form.height,age=+form.age;
    const calGoal=calcCalGoal(w,h,age,form.gender,form.activity,form.goal);
    const protGoal=calcProtein(w,form.goal);
    const profile={...form,weight:w,height:h,age,calGoal,protGoal,waterGoal:+form.water,sleepGoal:+form.sleep,setupDone:true};
    await db.collection("users").doc(user.uid).set(profile,{merge:true});
    onDone(profile);
  }

  return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"60px 24px 24px",flex:1,maxWidth:440,margin:"0 auto",width:"100%",boxSizing:"border-box"}} className="fade-in">
        <div style={{display:"flex",gap:6,marginBottom:30}}>
          {[0,1,2].map(i=><div key={i} style={{flex:1,height:4,borderRadius:99,background:i<=step?T.grad:T.bg3}}/>)}
        </div>
        {step===0&&(
          <div>
            <h2 style={{marginBottom:12}}>Biometric Shards</h2>
            <Input label="Name Identity" value={form.name} onChange={v=>set("name",v)}/>
            <Input label="Contact Field (WhatsApp Phone)" value={form.phone||""} onChange={v=>set("phone",v)} placeholder="91XXXXXXXXXX" />
            <Input label="Biological Age" value={form.age} onChange={v=>set("age",v)} type="number"/>
            <Select label="Biological Gender" value={form.gender} onChange={v=>set("gender",v)} options={["Male","Female","Other"]}/>
          </div>
        )}
        {step===1&&(
          <div>
            <h2 style={{marginBottom:12}}>Physiological Configuration</h2>
            <Input label="Height Scale (cm)" value={form.height} onChange={v=>set("height",v)} type="number"/>
            <Input label="Absolute Weight Mass (kg)" value={form.weight} onChange={v=>set("weight",v)} type="number"/>
            <Select label="Transformation Intent" value={form.goal} onChange={v=>set("goal",v)} options={["Fat Loss","Muscle Gain","Strength","Cutting","Bulking","Maintain"]}/>
          </div>
        )}
        {step===2&&(
          <div>
            <h2 style={{marginBottom:12}}>Routine Baselines</h2>
            <Select label="Activity Strain Level" value={form.activity} onChange={v=>set("activity",v)} options={["Sedentary","Light","Moderate","Active","VeryActive"]}/>
            <Select label="Diet Selection Matrix" value={form.diet} onChange={v=>set("diet",v)} options={["Veg","Non-Veg","Vegan"]}/>
          </div>
        )}
      </div>
      <div style={{padding:"16px 24px 36px",display:"flex",gap:12,maxWidth:440,margin:"0 auto",width:"100%"}}>
        {step>0&&<Btn variant="secondary" onClick={()=>setStep(s=>s-1)} style={{flex:1}}>← Return</Btn>}
        <Btn onClick={handleNext} disabled={step===0&&!form.name.trim()} style={{flex:2}}>{step===2?"🏁 Mount Platform Hub":"Continue →"}</Btn>
      </div>
    </div>
  );
}

        <Card><span>Pedestrian Steps</span><h4>👟 {todaySteps.toLocaleString()}</h4><ProgressBar value={todaySteps} max={10000} color={T.green} style={{marginTop:4}}/></Card>
      </div>
      <ReminderSubsystem />
    </div>
  );
}

function ReminderSubsystem() {
  const [config, setConfig] = useState({ workoutTime: "07:00", enabled: false });
  useEffect(() => {
    if (!config.enabled) return;
    const taskCycleInterval = setInterval(() => {
      const liveStr = new Date().toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit" });
      if (liveStr === config.workoutTime && Notification.permission === "granted") {
        new Notification("FitPro SaaS Alert", { body: "Time to complete operational execution tracking!" });
      }
    }, 60000);
    return () => clearInterval(taskCycleInterval);
  }, [config]);

  return (
    <Card style={{ marginTop: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>Smart System Reminders</span>
        <input type="checkbox" checked={config.enabled} onChange={e => {
          if(e.target.checked) { Notification.requestPermission(); setConfig(p=>({...p, enabled:true})); }
          else setConfig(p=>({...p, enabled:false}));
        }} style={{ width: 16, height: 16, accentColor: T.purple }} />
      </div>
    </Card>
  );
}

function NutritionTab({profile,userData,saveData}){
  const [section,setSection]=useState("Lunch");
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [analysisResult,setAnalysisResult]=useState(null);
  
  const sectionsMenu = ["Breakfast", "Lunch", "Dinner", "Snacks", "Pre-Workout", "Post-Workout", "Late Night"];
  const currentDayMeals=userData?.nutrition?.[today()]||{};

  async function analyzeAI(){
    if(!input.trim()) return;
    setLoading(true); setAnalysisResult(null);
    const output=await callAI([{role:"user",content:`Meal: ${input}. Section: ${section}. Diet: ${profile.diet}`}],
      `Return absolute computational nutrition values in exact single line string layout scheme block ONLY: {"foods":["item"],"macros":{"calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0},"summary":"Brief description metrics text string"}. No descriptions conversations lines outside schema tags. No markdown code formatting wrappers.`,true);
    if(output) setAnalysisResult(output);
    setLoading(false);
  }

  async function saveMeal(){
    if(!analysisResult) return;
    const updated={...userData,nutrition:{...(userData?.nutrition||{}),[today()]:{...currentDayMeals,[`${section}_${Date.now()}`]:{type:section,foods:analysisResult.foods,macros:analysisResult.macros,summary:analysisResult.summary,timestamp:new Date().toISOString()}}}};
    await saveData(updated); setInput(""); setAnalysisResult(null);
  }

  return(
    <div style={{padding:"0 16px 100px"}} className="fade-in">
      <Card style={{marginBottom:14}}>
        <div className="meal-chip-scroll">
          {sectionsMenu.map(s=><button key={s} onClick={()=>{setSection(s);setAnalysisResult(null);}} style={{background:section===s?T.grad:T.card,color:section===s?"#fff":T.muted,border:`1px solid ${section===s?"transparent":T.border}`,borderRadius:99,padding:"8px 16px",fontSize:"13px",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{s}</button>)}
        </div>
      </Card>
      <Card style={{marginBottom:14}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="e.g. 2 paratha, paneer sabji, chawal details input logs..." style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,borderRadius:T.r,color:T.text,padding:"12px",fontSize:"14px",outline:"none",minHeight:80,resize:"none"}}/>
        <Btn onClick={analyzeAI} disabled={loading||!input.trim()} style={{width:"100%",marginTop:10}}>{loading?<TypingDots/>:"🤖 Parse via Intelligence Engine"}</Btn>
      </Card>
      {analysisResult&&(
        <Card style={{marginBottom:14,border:`1px solid ${T.green}44`}}>
          <p style={{fontSize:"13px",color:T.muted,lineHeight:1.5,marginBottom:10}}>{analysisResult.summary}</p>
          <div style={{display:"flex",gap:10}}><Btn variant="ghost" onClick={()=>setAnalysisResult(null)} style={{flex:1}}>Discard</Btn><Btn onClick={saveMeal} style={{flex:2}} variant="green">Commit Log Sheet</Btn></div>
        </Card>
      )}
    </div>
  );
  }
    function WorkoutTab({profile,userData,saveData}){
  const [selectedDate,setSelectedDate] = useState(today());
  const [view,setView] = useState("calendar");
  const [session,setSession] = useState(null);
  const [bodyPart,setBodyPart] = useState("Chest");

  const workouts=userData?.workouts||{};
  const currentObjectDate = new Date(selectedDate);
  const daysInMonthCount = new Date(currentObjectDate.getFullYear(), currentObjectDate.getMonth() + 1, 0).getDate();

  function triggerSessionStart() {
    setSession(workouts[selectedDate] || { date: selectedDate, exercises: [] });
    setView("session");
  }

  function appendExerciseTemplate(name) {
    if (session.exercises.some(e => e.name === name)) return;
    setSession(p => ({ ...p, exercises: [...(p.exercises || []), { id: uid(), name, sets: [{ reps: 10, weight: 20, checked: false }] }] }));
  }

  function updateSetInstance(exId, sIdx, key, val) {
    setSession(p => ({
      ...p, exercises: p.exercises.map(e => e.id === exId ? {
        ...e, sets: e.sets.map((s, idx) => idx === sIdx ? { ...s, [key]: key === "checked" ? val : +val } : s)
      } : e)
    }));
  }

  async function saveSessionToCloud() {
    const updated={...userData,workouts:{...(userData?.workouts||{}),[selectedDate]:session}};
    await saveData(updated); setView("calendar");
  }

  return (
    <div style={{ padding: "0 16px 100px" }} className="fade-in">
      {view === "calendar" ? (
        <div>
          <Card style={{ marginBottom: 14, textAlign: "center" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
              {Array(daysInMonthCount).fill(null).map((_, i) => {
                const dayStr = i + 1;
                const mappingDateKey = `2026-06-${String(dayStr).padStart(2, '0')}`;
                const matchSelection = selectedDate === mappingDateKey;
                return (
                  <div key={dayStr} onClick={() => setSelectedDate(mappingDateKey)} style={{ padding: "8px 0", cursor: "pointer", background: matchSelection ? "rgba(139,92,246,0.2)" : "transparent", borderRadius: 8 }}>
                    <span style={{ color: workouts[mappingDateKey] ? T.green : T.text, fontWeight: matchSelection ? 800 : 400 }}>{dayStr}</span>
                  </div>
                );
              })}
            </div>
          </Card>
          <Btn onClick={triggerSessionStart} fullWidth>Start Selected Session</Btn>
        </div>
      ) : (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}><Btn variant="ghost" onClick={() => setView("calendar")}>Back</Btn><Btn onClick={saveSessionToCloud} style={{ flex: 1 }}>Finish Workout</Btn></div>
          {session.exercises?.map(ex => (
            <Card key={ex.id} style={{ marginBottom: 12 }}>
              <h4 style={{ marginBottom: 8 }}>{ex.name}</h4>
              {ex.sets.map((s, idx) => (
                <div key={idx} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, background: T.bg3, padding: 6, borderRadius: 8 }}>
                  <span style={{ fontSize: "11px", color: T.muted }}>S{idx + 1}</span>
                  <input type="number" value={s.reps} onChange={e => updateSetInstance(ex.id, idx, "reps", e.target.value)} style={{ width: 45, background: T.bg, border: "none", color: "#fff", textAlign: "center", borderRadius: 4, padding: 4 }} />
                  <input type="number" value={s.weight} onChange={e => updateSetInstance(ex.id, idx, "weight", e.target.value)} style={{ width: 50, background: T.bg, border: "none", color: "#fff", textAlign: "center", borderRadius: 4, padding: 4 }} />
                  <button onClick={() => updateSetInstance(ex.id, idx, "checked", !s.checked)} style={{ background: "none", border: "none", cursor: "pointer", marginLeft: "auto" }}>{s.checked ? "✅" : "⭕"}</button>
                </div>
              ))}
              <Btn small variant="ghost" onClick={() => setSession(p => ({ ...p, exercises: p.exercises.map(e => e.id === ex.id ? { ...e, sets: [...e.sets, { reps: 10, weight: 20, checked: false }] } : e) }))}>+ Add Set</Btn>
            </Card>
          ))}
          <Card style={{ marginTop: 14 }}>
            <div style={{ display: "flex", gap: 6 }}>{EXERCISES[bodyPart]?.map(n => <button key={n} onClick={() => appendExerciseTemplate(n)} style={{ background: T.bgInput, color: "#fff", padding: "8px 12px", border: "none", borderRadius: "8px", cursor: "pointer" }}>+ {n}</button>)}</div>
          </Card>
        </div>
      )}
    </div>
  );
}

function AICoachTab({profile}){
  const [chatLog,setChatLog]=useState([{role:"assistant",content:`Namaste ${profile.name}! Ask any metric prompt. 🔥`}]);
  const [text,setText]=useState("");
  const [sending,setSending]=useState(false);

  async function executeSend(){
    if(!text.trim() || sending) return;
    const msgNode={role:"user",content:text};
    setChatLog(p=>[...p,msgNode]); setText(""); setSending(true);
    const reply=await callAI(chatLog.concat([msgNode]),`FitPro System Logic. User target orientation path: ${profile.goal}. Respond in short natural friendly mixed Hinglish/English tone. Under 60 words total.`);
    setChatLog(p=>[...p,{role:"assistant",content:reply}]);
    setSending(false);
  }
  return(
    <div style={{padding:"0 16px 100px"}} className="fade-in">
      <div style={{height:"240px",overflowY:"auto",marginBottom:12}}>{chatLog.map((m,i)=><div key={i} style={{color:m.role==="user"?T.purple:T.text,marginBottom:8,fontSize:"14px"}}><b>{m.role==="user"?"You":"Coach"}:</b> {m.content}</div>)}</div>
      <div style={{display:"flex",gap:8}}><input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&executeSend()} placeholder="Ask prompt..." style={{flex:1,background:T.bg3,border:`1px solid ${T.border}`,borderRadius:T.r,color:T.text,padding:12,outline:"none"}}/><Btn onClick={executeSend} disabled={sending || !text.trim()}>Send</Btn></div>
    </div>
  );
}

}
