  function calcBMI(w, h) { if (!w || !h) return 0; return +(w / ((h / 100) ** 2)).toFixed(1); }
  function bmiLabel(b) { if (b < 18.5) return ["Underweight Tier", T.cyan]; if (b < 25) return ["Optimal Baseline", T.mint]; if (b < 30) return ["Overweight Limit", T.accent]; return ["Obese Scale Range", T.rose]; }
  
  function calcCalGoal(w, h, age, gender, activity, goal) {
    if (!w) return 2000;
    const bmr = gender === "Female" ? 10 * w + 6.25 * h - 5 * age - 161 : 10 * w + 6.25 * h - 5 * age + 5;
    const af = { Sedentary: 1.2, Light: 1.375, Moderate: 1.55, Active: 1.725, VeryActive: 1.9 }[activity] || 1.55;
    const tdee = bmr * af;
    const adj = { "Fat Loss": -500, "Cutting": -600, "Muscle Gain": 350, "Bulking": 500, "Strength": 250, "Maintain": 0 }[goal] || 0;
    return Math.round(tdee + adj);
  }
  
  function calcProtein(w, goal) {
    const mul = { "Muscle Gain": 2.2, "Bulking": 2.0, "Strength": 2.1, "Cutting": 2.4, "Fat Loss": 1.9, "Maintain": 1.6 }[goal] || 1.8;
    return Math.round((w || 70) * mul);
  }

    try {

      if (json) { return JSON.parse(text.replace(/```json|```/g, "").trim()); }
      return text;
    } catch (e) { return json ? null : "AI offline. Track manually."; }

    }

  function Onboarding({ user, onDone }) {
    const [step, setStep] = useState(0);
    const [form, setForm] = useState({ name: "", age: "24", phone: "", gender: "Male", height: "175", weight: "72", level: "Intermediate", goal: "Muscle Gain", diet: "Veg", activity: "Moderate", sleep: "7", water: "3.5" });

  function DashboardTab({ profile, userData }) {
    const nutrition = userData?.nutrition || {};
    const todayMeals = nutrition[today()] || {};
    const totalCal = Object.values(todayMeals).reduce((s, m) => s + (m.macros?.calories || 0), 0);
    const totalProt = Object.values(todayMeals).reduce((s, m) => s + (m.macros?.protein || 0), 0);
    const totalCarbs = Object.values(todayMeals).reduce((s, m) => s + (m.macros?.carbs || 0), 0);
    const totalFat = Object.values(todayMeals).reduce((s, m) => s + (m.macros?.fat || 0), 0);
    const todayWater = userData?.water?.[today()] || 0;
    const todaySteps = userData?.steps?.[today()] || 0;
    const bmi = calcBMI(profile.weight, profile.height);
    const [bmiLbl, bmiColor] = bmiLabel(bmi);
    return (
      <div style={{ padding: "0 20px 120px" }} className="fade-in">

          <span style={{ color: T.muted, fontSize: "10px" }}>Calorie Energy Pipeline</span>

            <div><span style={{ fontSize: "9px", color: T.muted }}>PROTEIN</span><p style={{ fontSize: "12px" }}>{totalProt}g/{profile.protGoal}g</p></div>
            <div><span style={{ fontSize: "9px", color: T.muted }}>CARBS</span><p style={{ fontSize: "12px" }}>{totalCarbs}g/250g</p></div>
            <div><span style={{ fontSize: "9px", color: T.muted }}>FAT</span><p style={{ fontSize: "12px" }}>{totalFat}g/70g</p></div>
          </div>
        </PremiumCard>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
          <PremiumCard><span>Fluid Log</span><h4>💧 {todayWater} L</h4></PremiumCard>
          <PremiumCard><span>Steps Log</span><h4>👟 {todaySteps.toLocaleString()}</h4></PremiumCard>

      </div>
    );

  function ReminderSubsystem() {
    const [config, setConfig] = useState({ workoutTime: "07:00", mealTime: "13:30", enabled: false });
    useEffect(() => {
      if (!config.enabled) return;
      const interval = setInterval(() => {
        const timeNow = new Date().toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit" });
        if (timeNow === config.workoutTime && Notification.permission === "granted") { new Notification("FitPro Alert", { body: "Time for training output verification!" }); }
      }, 60000);
      return () => clearInterval(interval);
    }, [config]);
    return (
      <PremiumCard style={{ marginTop: "16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontSize: "10px", color: T.muted }}>Smart Reminders</span>
          <input type="checkbox" checked={config.enabled} onChange={e => { if(e.target.checked) { Notification.requestPermission(); setConfig(p=>({...p, enabled:true})); } else setConfig(p=>({...p, enabled:false})); }} />
        </div>
      </PremiumCard>
    );
  }
  
  function NutritionTab({ profile, userData, saveData }) {
    const [section, setSection] = useState("Lunch");
    const [query, setQuery] = useState("");
    const [processing, setProcessing] = useState(false);
    const [stagedResult, setStagedResult] = useState(null);
    const mealSections = ["Breakfast", "Lunch", "Dinner", "Snacks", "Pre-Workout", "Post-Workout", "Late Night"];
    const currentDayMeals = userData?.nutrition?.[today()] || {};
    async function parseDietAI() {
      if (!query.trim()) return;
      setProcessing(true);
      const result = await callAI([{ role: "user", content: `Meal Section: ${section}. Query: ${query}. Diet: ${profile.diet}` }],
        `You are FitPro Engine. Return ONLY JSON format: {"foods":["Item"],"macros":{"calories":0,"protein":0,"carbs":0,"fat":0,"fiber":0}, "summary": "text"}. No markdown formatting.`, true);
      if (result) setStagedResult(result);
      setProcessing(false);
    }
    async function logMealToDatabase() {
      if (!stagedResult) return;
      const key = `${section}_${Date.now()}`;
      const updated = { ...userData, nutrition: { ...(userData?.nutrition || {}), [today()]: { ...currentDayMeals, [key]: { type: section, foods: stagedResult.foods, macros: stagedResult.macros, timestamp: new Date().toISOString() } } } };
      await saveData(updated);
      setQuery(""); setStagedResult(null);
    }
    return (
      <div style={{ padding: "0 20px 120px" }} className="fade-in">
        <PremiumCard style={{ marginBottom: "16px" }}>
          <div className="meal-chip-scroll">
            {mealSections.map(s => <button key={s} onClick={() => setSection(s)} style={{ background: section === s ? T.accent : "rgba(255,255,255,0.03)", color: section === s ? "#000" : "#fff", padding: "8px 16px", border: "none", borderRadius: "20px", fontWeight: "700", fontSize: "12px", cursor: "pointer" }}>{s}</button>)}
          </div>
        </PremiumCard>
        <PremiumCard style={{ marginBottom: "16px" }}>
          <textarea value={query} onChange={e => setQuery(e.target.value)} placeholder="e.g. 2 paratha, butter, chawal..." style={{ width: "100%", height: "90px", background: T.bgInput, border: `1px solid ${T.border}`, borderRadius: "12px", color: T.text, padding: "12px", outline: "none" }} />
          <PremiumBtn variant="accent" onClick={parseDietAI} disabled={processing || !query.trim()} fullWidth style={{ marginTop: "12px" }}>{processing ? "Analyzing..." : "Execute AI Calibration"}</PremiumBtn>
        </PremiumCard>
        {stagedResult && (
          <PremiumCard style={{ marginBottom: "16px" }}>
            <p>{stagedResult.summary}</p>
            <div style={{ display: "flex", gap: "10px", marginTop: "10px" }}>
              <PremiumBtn variant="secondary" onClick={() => setStagedResult(null)}>Discard</PremiumBtn>
              <PremiumBtn variant="accent" onClick={logMealToDatabase}>Commit Log Entry</PremiumBtn>
            </div>
          </PremiumCard>
        )}
      </div>
    );
  }
  
  function WorkoutTab({ profile, userData, saveData }) {
    const [selectedDate, setSelectedDate] = useState(today());
    const [view, setView] = useState("calendar");
    const [activeSession, setActiveSession] = useState(null);
    const [bodyPart, setBodyPart] = useState("Chest");
    const workouts = userData?.workouts || {};
    const currentObjectDate = new Date(selectedDate);
    const daysInMonthCount = new Date(currentObjectDate.getFullYear(), currentObjectDate.getMonth() + 1, 0).getDate();
    function triggerSessionInitialize() {
      setActiveSession(workouts[selectedDate] || { date: selectedDate, exercises: [] });
      setView("session");
    }
    function appendExerciseTemplate(name) {
      if (activeSession.exercises.some(e => e.name === name)) return;
      setActiveSession(p => ({ ...p, exercises: [...p.exercises, { id: uid(), name, sets: [{ reps: 10, weight: 40, rpe: 8, checked: false }] }] }));
    }
    async function commitSessionToCloud() {
      const updated = { ...userData, workouts: { ...(userData?.workouts || {}), [selectedDate]: activeSession } };
      await saveData(updated);
      setView("calendar");
    }
    return (
      <div style={{ padding: "0 20px 120px" }} className="fade-in">
        {view === "calendar" ? (
          <div>
            <PremiumCard style={{ marginBottom: "16px", textAlign: "center" }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "6px" }}>
                {Array(daysInMonthCount).fill(null).map((_, i) => {
                  const day = i + 1;
                  const dateStr = `2026-06-${String(day).padStart(2, '0')}`;
                  return <div key={day} onClick={() => setSelectedDate(dateStr)} style={{ padding: "8px 0", cursor: "pointer", background: selectedDate === dateStr ? "rgba(226,184,103,0.2)" : "transparent", borderRadius: "8px" }}><span style={{ color: workouts[dateStr] ? T.mint : T.text }}>{day}</span></div>;
                })}
              </div>
            </PremiumCard>
            <PremiumBtn variant="accent" onClick={triggerSessionInitialize} fullWidth>Start Selected Session</PremiumBtn>
          </div>
        ) : (
          <div>
            <div style={{ display: "flex", gap: "10px", marginBottom: "16px" }}><PremiumBtn variant="secondary" onClick={() => setView("calendar")}>Back</PremiumBtn><PremiumBtn variant="accent" onClick={commitSessionToCloud}>Finish Workout</PremiumBtn></div>
            {activeSession.exercises.map(ex => (
              <PremiumCard key={ex.id} style={{ marginBottom: "12px" }}>
                <h4>{ex.name}</h4>
                <PremiumBtn variant="secondary" onClick={() => appendExerciseTemplate(ex.name)}>Add Set</PremiumBtn>
              </PremiumCard>
            ))}
            <PremiumCard><div style={{ display: "flex", gap: "6px" }}>{BODY_EXERCISES[bodyPart]?.map(n => <button key={n} onClick={() => appendExerciseTemplate(n)} style={{ background: T.bgInput, color: "#fff", padding: "6px", border: "none", borderRadius: "4px" }}>{n}</button>)}</div></PremiumCard>
          </div>
        )}
      </div>
    );
  }
    function AICoachTab({ profile }) {
    const [chatLog, setChatLog] = useState([{ role: "assistant", content: `Greetings ${profile.name}. Online.` }]);
    const [text, setText] = useState("");
    async function send() {
      const uMsg = { role: "user", content: text };
      setChatLog(p => [...p, uMsg]); setText("");
      const reply = await callAI(chatLog.concat([uMsg]), "You are FitPro Engine. Match Hinglish/English patterns.");
      setChatLog(p => [...p, { role: "assistant", content: reply }]);
    }
    return (
      <div style={{ padding: "0 20px 120px" }}>
        <div style={{ height: "300px", overflowY: "auto" }}>{chatLog.map((m, i) => <div key={i} style={{ color: m.role === "user" ? T.accent : "#fff" }}>{m.content}</div>)}</div>
        <input value={text} onChange={e => setText(e.target.value)} style={{ width: "100%", background: T.bgInput, color: "#fff", padding: "10px" }} />
        <button onClick={send}>Send</button>
      </div>
    );
  }
  
  function SettingsTab({ userData, user }) {
    const link = `${window.location.origin}${window.location.pathname}?ref=${userData?.myReferralCode || ""}`;
    return (
      <div style={{ padding: "0 20px 120px" }}>
        <PremiumCard><h4>{user.email}</h4></PremiumCard>
        <PremiumCard><h5>Referral Link:</h5><p style={{ wordBreak: "break-all" }}>{link}</p></PremiumCard>
      </div>
    );
  }
  
  function AdminPanel({ onClose }) {
    const [users, setUsers] = useState([]);
    useEffect(() => { db.collection("users").onSnapshot(s => setUsers(s.docs.map(d => d.data()))); }, []);
    function downloadPDF(u) {
      const el = document.createElement("div");
      el.innerHTML = `<h1>FitPro Report - ${u.name}</h1><p>Goal: ${u.goal}</p><p>Streak: ${u.streak || 0}</p>`;
      html2pdf().from(el).save(`Report_${u.name}.pdf`);
    }
    return (
      <div style={{ position: "fixed", inset: 0, background: T.bg, zIndex: 10000, padding: "20px" }}>
        <button onClick={onClose}>Close</button>
        {users.map((u, i) => <div key={i} style={{ margin: "10px 0" }}><span>{u.name} ({u.email})</span><button onClick={() => downloadPDF(u)}>Generate Weekly Report</button></div>)}
      </div>
    );
  }
  
  function FitPro() {
    const [user, setUser] = useState(null);
    const [loading, setLoading] = useState(true);
    const [userData, setUserData] = useState(null);
    const [activeTab, setActiveTab] = useState("home");
    const [admin, setAdmin] = useState(false);
    const [taps, setTaps] = useState(0);
    useEffect(() => { auth.onAuthStateChanged(u => { setUser(u); setLoading(false); }); }, []);
    useEffect(() => { if (user) { db.collection("users").doc(user.uid).onSnapshot(s => setUserData(s.data())); } }, [user]);
    if (loading) return <div style={{ color: "#fff", textAlign: "center", marginTop: "20%" }}>Initializing Ecosystem...</div>;
    if (!user) return <AuthScreen onAuth={u => setUser(u)} />;
    if (!userData?.setupDone) return <Onboarding user={user} onDone={p => setUserData(p)} />;
    return (
      <div style={{ background: T.bg, minHeight: "100vh", maxWidth: "440px", margin: "0 auto", position: "relative", borderLeft: `1px solid ${T.border}`, borderRight: `1px solid ${T.border}` }}>
        {admin && <AdminPanel onClose={() => setAdmin(false)} />}
        <header style={{ padding: "40px 20px 16px", display: "flex", justifyContent: "space-between" }} className="premium-blur">
          <div onClick={() => { setTaps(t=> { if(t+1>=5 && user.email===ADMIN_EMAIL) { setAdmin(true); return 0; } return t+1; }); }}>
            <h2>FitPro <span style={{ color: T.accent }}>AI</span></h2>
          </div>
        </header>
        <main>
          {activeTab === "home" && <DashboardTab profile={userData} userData={userData} />}
          {activeTab === "nutrition" && <NutritionTab profile={userData} userData={userData} saveData={d=>db.collection("users").doc(user.uid).set(d,{merge:true})} />}
          {activeTab === "workout" && <WorkoutTab profile={userData} userData={userData} saveData={d=>db.collection("users").doc(user.uid).set(d,{merge:true})} />}
          {activeTab === "ai" && <AICoachTab profile={userData} />}
          {activeTab === "settings" && <SettingsTab userData={userData} user={user} />}
        </main>
        <nav style={{ position: "fixed", bottom: "24px", left: "50%", transform: "translateX(-50%)", width: "calc(100% - 32px)", maxWidth: "408px", background: "rgba(18, 18, 29, 0.88)", borderRadius: "20px", display: "flex", padding: "10px 0" }} className="premium-blur">
          {[{ id: "home", label: "Hub", icon: "🌌" }, { id: "workout", label: "Train", icon: "🏋️" }, { id: "nutrition", label: "Diet", icon: "🍛" }, { id: "ai", label: "Coach", icon: "🤖" }, { id: "settings", label: "Config", icon: "⚙️" }].map(t => <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ flex: 1, background: "none", border: "none", color: activeTab === t.id ? T.accent : T.muted, cursor: "pointer" }}><div>{t.icon}</div><div style={{ fontSize: "9px" }}>{t.label}</div></button>)}
        </nav>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<FitPro/>);
  </script>
</body>
</html>
